filebeat.inputs:
  - type: filestream
    id: recipeGen-backend
    enabled: true
    paths:
      - /app-logs/*.log
    ignore_older: 24h
    fields:
      service: recipegen
      component: backend
      environment: dev
    fields_under_root: true
    parsers:
      - ndjson:
          overwrite_keys: true
          add_error_key: true
          expand_keys: true

  - type: filestream
    id: recipeGen-database
    enabled: true
    paths:
      - /var/log/mysql/*.log
    fields:
      service: recipegen
      component: mysql
      environment: dev
    fields_under_root: true

# Logstash Output (for Logstash pipeline processing)
output.logstash:
  hosts: ["logstash:5044"]

# Elasticsearch Direct Output (for data streams)
# Uncomment below if you want direct Elasticsearch output with data streams
# output.elasticsearch:
#   hosts: ["http://${ELASTICSEARCH_HOST:elasticsearch}:${ELASTICSEARCH_PORT:9200}"]
#   index: "logs-recipeGen-app-default"
#   pipeline: "logs"

# Processing and data stream settings
processors:
  - add_fields:
      target: log
      fields:
        version: "1.0"
  - add_host_metadata:
  - add_docker_metadata:

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
